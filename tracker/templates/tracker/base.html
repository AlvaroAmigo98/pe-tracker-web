<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PE Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; font-size: 14px; }
    .topbar { background: #1a1a2e; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; }
    .topbar-title { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; }
    .nav { display: flex; gap: 4px; }
    .nav a { color: rgba(255,255,255,0.7); text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; transition: all 0.15s; }
    .nav a:hover, .nav a.active { background: rgba(255,255,255,0.12); color: white; }
    .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: rgba(255,255,255,0.6); }
    .topbar-right a { color: rgba(255,255,255,0.6); text-decoration: none; }
    .topbar-right a:hover { color: white; }
    .content { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Page header row */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .page-title { font-size: 20px; font-weight: 600; color: #1a1a2e; }
    .page-meta { font-size: 12px; color: #aaa; }

    .card { background: white; border-radius: 10px; border: 1px solid #e8e8e8; overflow: hidden; margin-bottom: 20px; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .badge { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 99px; }
    .badge-hire  { background: #e1f5ee; color: #0f6e56; }
    .badge-leave { background: #fcebeb; color: #a32d2d; }
    .badge-promo { background: #faeeda; color: #854f0b; }
    .badge-role  { background: #e6f1fb; color: #185fa5; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 600; color: #888; background: #fafafa; border-bottom: 1px solid #f0f0f0; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; user-select: none; white-space: nowrap; }
    th:hover { color: #1a1a2e; }
    td { padding: 10px 14px; border-bottom: 1px solid #f8f8f8; color: #333; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .name-cell { font-weight: 500; color: #1a1a2e; }
    .subtle { color: #aaa; font-size: 12px; }

    /* Filters */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
    .filter-group { display: flex; flex-direction: column; gap: 3px; }
    .filter-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
    input[type=text], select { border: 1px solid #ddd; border-radius: 7px; padding: 7px 12px; font-size: 13px; outline: none; background: white; color: #333; height: 34px; }
    input[type=text]:focus, select:focus { border-color: #1a1a2e; }
    input[type=text] { min-width: 220px; }
    .btn { background: #1a1a2e; color: white; border: none; border-radius: 7px; padding: 7px 16px; font-size: 13px; cursor: pointer; height: 34px; white-space: nowrap; }
    .btn:hover { background: #2d2d4e; }
    .btn-ghost { background: transparent; color: #888; border: 1px solid #ddd; border-radius: 7px; padding: 7px 14px; font-size: 13px; cursor: pointer; height: 34px; text-decoration: none; display: inline-flex; align-items: center; }
    .btn-ghost:hover { border-color: #aaa; color: #333; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card { background: white; border-radius: 10px; border: 1px solid #e8e8e8; padding: 16px 18px; cursor: pointer; transition: border-color 0.15s; }
    .stat-card:hover { border-color: #bbb; }
    .stat-card.active { border-color: #1a1a2e; }
    .stat-num { font-size: 30px; font-weight: 600; line-height: 1; }
    .stat-label { font-size: 12px; color: #888; margin-top: 5px; }
    .empty { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }

    /* Pagination */
    .pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-top: 1px solid #f0f0f0; font-size: 13px; color: #888; }
    .pagination-links { display: flex; gap: 4px; }
    .pagination-links a, .pagination-links span { padding: 4px 10px; border-radius: 6px; border: 1px solid #e8e8e8; text-decoration: none; color: #333; font-size: 12px; }
    .pagination-links a:hover { background: #f5f5f5; }
    .pagination-links .current { background: #1a1a2e; color: white; border-color: #1a1a2e; }

    /* Sort arrow */
    .sort-arrow { font-size: 10px; margin-left: 3px; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">PE Tracker</span>
    <div class="nav">
      <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="{% url 'people' %}" class="{% if request.resolver_match.url_name == 'people' %}active{% endif %}">People</a>
    </div>
    <div class="topbar-right">
      <span>{{ request.user.username }}</span>
      <a href="{% url 'logout' %}">Log out</a>
    </div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
