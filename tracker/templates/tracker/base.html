<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PE Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #06080F;
      --surface:      #0C1220;
      --surface2:     #111B2E;
      --border:       rgba(255,255,255,0.07);
      --border2:      rgba(255,255,255,0.12);
      --text-1:       #E2E8F4;
      --text-2:       #64748B;
      --text-3:       #2D3A4E;
      --accent:       #6366F1;
      --accent-hover: #818CF8;
      --nav:          #080C18;

      /* event colours */
      --hire:      #10B981; --hire-bg:  rgba(16,185,129,.14); --hire-text:  #6EE7B7;
      --leave:     #F43F5E; --leave-bg: rgba(244,63,94,.14);  --leave-text: #FDA4AF;
      --promo:     #F59E0B; --promo-bg: rgba(245,158,11,.14); --promo-text: #FCD34D;
      --role:      #38BDF8; --role-bg:  rgba(56,189,248,.14); --role-text:  #7DD3FC;

      --shadow:    0 1px 4px rgba(0,0,0,.4);
      --shadow-md: 0 8px 24px rgba(0,0,0,.5);
      --r: 12px; --r-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Topbar ──────────────────────────────────────────────────────────── */
    .topbar {
      background: var(--nav);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .topbar-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: white; letter-spacing: -0.5px;
      box-shadow: 0 0 12px rgba(99,102,241,.4);
    }
    .topbar-title { font-size: 14px; font-weight: 700; color: var(--text-1); letter-spacing: -0.2px; }
    .nav { display: flex; gap: 2px; flex: 1; }
    .nav a {
      color: var(--text-2);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: color .15s, background .15s;
    }
    .nav a:hover { color: var(--text-1); background: rgba(255,255,255,.06); }
    .nav a.active { color: white; background: rgba(99,102,241,.2); }
    .topbar-right { display: flex; align-items: center; gap: 14px; font-size: 13px; color: var(--text-2); }
    .topbar-user { display: flex; align-items: center; gap: 8px; }
    .topbar-avatar {
      width: 26px; height: 26px;
      background: rgba(99,102,241,.25);
      border: 1px solid rgba(99,102,241,.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #A5B4FC; text-transform: uppercase;
    }
    .topbar-divider { width: 1px; height: 18px; background: var(--border); }
    .topbar-right a { color: var(--text-2); text-decoration: none; transition: color .15s; font-size: 13px; }
    .topbar-right a:hover { color: var(--text-1); }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .content { max-width: 1300px; margin: 0 auto; padding: 32px 28px 56px; }

    /* ── Page header ─────────────────────────────────────────────────────── */
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 10px; }
    .page-title { font-size: 22px; font-weight: 800; color: var(--text-1); letter-spacing: -0.5px; }
    .page-meta { font-size: 12px; color: var(--text-2); margin-top: 4px; }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: rgba(255,255,255,.02);
    }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text-1); }

    /* ── Stat cards ──────────────────────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      cursor: pointer;
      transition: border-color .15s, transform .15s, box-shadow .15s;
      position: relative; overflow: hidden;
    }
    .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow); }
    .stat-num { font-size: 36px; font-weight: 800; line-height: 1; letter-spacing: -1.5px; }
    .stat-label { font-size: 12px; color: var(--text-2); margin-top: 6px; font-weight: 500; }
    .stat-indicator { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 14px; }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600; padding: 2px 9px;
      border-radius: 99px; letter-spacing: 0.02em; white-space: nowrap;
    }
    .badge-hire  { background: var(--hire-bg);  color: var(--hire-text); }
    .badge-leave { background: var(--leave-bg); color: var(--leave-text); }
    .badge-promo { background: var(--promo-bg); color: var(--promo-text); }
    .badge-role  { background: var(--role-bg);  color: var(--role-text); }
    /* region */
    .badge-emea { background: rgba(16,185,129,.13);  color: #6EE7B7; }
    .badge-na   { background: rgba(96,165,250,.13);  color: #93C5FD; }
    .badge-apac { background: rgba(251,191,36,.13);  color: #FCD34D; }
    /* function */
    .badge-buyout  { background: rgba(245,158,11,.13); color: #FCD34D; }
    .badge-infra   { background: rgba(56,189,248,.13); color: #7DD3FC; }
    .badge-re      { background: rgba(52,211,153,.13); color: #6EE7B7; }
    .badge-credit  { background: rgba(167,139,250,.13);color: #C4B5FD; }
    .badge-vc      { background: rgba(244,63,94,.13);  color: #FDA4AF; }
    .badge-invest  { background: rgba(99,102,241,.13); color: #A5B4FC; }
    .badge-advisory{ background: rgba(34,211,238,.13); color: #67E8F9; }
    .badge-ops     { background: rgba(107,114,128,.13);color: #9CA3AF; }
    .badge-senior  { background: rgba(245,158,11,.13); color: #FCD34D; }
    .badge-junior  { background: rgba(56,189,248,.13); color: #7DD3FC; }

    /* ── Tables ──────────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 10px 16px;
      font-size: 10px; font-weight: 700; color: var(--text-3);
      background: rgba(255,255,255,.02);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase; letter-spacing: 0.08em;
      white-space: nowrap; cursor: pointer; user-select: none;
    }
    th:hover { color: var(--text-2); }
    td { padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,.03); color: var(--text-1); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background .1s; }
    tbody tr:hover td { background: rgba(255,255,255,.03); }
    .name-cell { font-weight: 600; color: var(--text-1); }
    .subtle { color: var(--text-2); font-size: 12px; }

    /* ── Filter bar ──────────────────────────────────────────────────────── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-label { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
    input[type=text], select {
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 7px 12px;
      font-size: 13px; font-family: inherit;
      outline: none;
      background: var(--surface2);
      color: var(--text-1);
      height: 36px;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type=text]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    input[type=text] { min-width: 220px; }
    select option { background: var(--surface2); color: var(--text-1); }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      background: var(--accent); color: white; border: none;
      border-radius: var(--r-sm); padding: 7px 16px;
      font-size: 13px; font-family: inherit; font-weight: 600;
      cursor: pointer; height: 36px; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background .15s, transform .1s; text-decoration: none;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(.98); }
    .btn-ghost {
      background: transparent; color: var(--text-2);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 7px 14px; font-size: 13px; font-family: inherit; font-weight: 500;
      cursor: pointer; height: 36px; text-decoration: none;
      display: inline-flex; align-items: center;
      transition: border-color .15s, color .15s;
    }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text-1); }
    .btn-green { background: #059669; } .btn-green:hover { background: #047857; }
    .btn-red   { background: #DC2626; } .btn-red:hover   { background: #B91C1C; }
    .btn-gray  { background: #1E293B; color: var(--text-2); border: 1px solid var(--border); }
    .btn-gray:hover { background: var(--surface2); color: var(--text-1); }

    /* ── Tabs ────────────────────────────────────────────────────────────── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab-btn {
      padding: 9px 18px; font-size: 13px; font-weight: 500; color: var(--text-2);
      cursor: pointer; text-decoration: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: all .15s; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-1); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

    /* ── Pagination ──────────────────────────────────────────────────────── */
    .pagination { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-2); }
    .pagination-links { display: flex; gap: 4px; }
    .pagination-links a, .pagination-links span { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); text-decoration: none; color: var(--text-2); font-size: 12px; transition: background .1s; }
    .pagination-links a:hover { background: var(--surface2); }
    .pagination-links .current { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Dropdown ────────────────────────────────────────────────────────── */
    .dropdown { position: relative; display: inline-block; }
    .dropdown-btn {
      border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 12px;
      font-size: 13px; font-family: inherit; background: var(--surface2); color: var(--text-1);
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      white-space: nowrap; height: 36px; transition: border-color .15s;
    }
    .dropdown-btn:hover { border-color: var(--border2); }
    .dropdown-btn .count { background: var(--accent); color: white; border-radius: 99px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
    .dropdown-btn .chevron { font-size: 10px; color: var(--text-2); }
    .dropdown-panel {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 6px 0;
      min-width: 210px; z-index: 100; box-shadow: var(--shadow-md);
      max-height: 300px; overflow-y: auto;
    }
    .dropdown-panel.open { display: block; }
    .dropdown-panel label {
      display: flex; align-items: center; gap: 10px; padding: 7px 14px;
      font-size: 13px; cursor: pointer; color: var(--text-1); transition: background .1s;
    }
    .dropdown-panel label:hover { background: var(--surface2); }
    .dropdown-panel input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); }
    .dropdown-panel::-webkit-scrollbar { width: 4px; }
    .dropdown-panel::-webkit-scrollbar-track { background: transparent; }
    .dropdown-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── Sort links ──────────────────────────────────────────────────────── */
    .sort-link { font-size:12px; font-weight:500; color:var(--text-2); text-decoration:none; padding:3px 10px; border-radius:6px; transition:all .1s; border: 1px solid transparent; }
    .sort-link:hover { color:var(--text-1); background:var(--surface2); }
    .sort-active { font-weight:700 !important; color:var(--accent) !important; background:rgba(99,102,241,.1); border-color: rgba(99,102,241,.25) !important; }
    .sort-arrow { font-size: 10px; margin-left: 3px; opacity: .5; }

    /* ── Sticky table header ─────────────────────────────────────────────── */
    thead th { position: sticky; top: 56px; z-index: 10; background: var(--surface); }
    .th-sorted { color: var(--accent) !important; }

    /* ── Row links (clickable names in tables) ───────────────────────────── */
    .row-link { color: inherit; text-decoration: none; transition: color .12s; }
    .row-link:hover { color: var(--accent); }

    /* ── Recent-event row highlight ──────────────────────────────────────── */
    .row-new td:first-child { border-left: 2px solid var(--hire); }

    /* ── Filter chips ────────────────────────────────────────────────────── */
    .filter-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 99px; padding: 3px 8px 3px 11px;
      font-size: 12px; color: var(--text-1);
    }
    .chip-key { color: var(--text-2); font-size: 11px; margin-right: 2px; }
    .chip-x {
      background: none; border: none; color: var(--text-2); cursor: pointer;
      font-size: 15px; line-height: 1; padding: 0 3px; font-family: inherit;
      transition: color .1s;
    }
    .chip-x:hover { color: var(--text-1); }

    /* ── Typeahead ───────────────────────────────────────────────────────── */
    .typeahead-wrap { position: relative; flex: 0 0 auto; display: flex; align-items: center; }
    .typeahead-panel {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 6px 0;
      min-width: 280px; z-index: 200; box-shadow: var(--shadow-md);
    }
    .typeahead-panel.open { display: block; }
    .typeahead-section { padding: 5px 14px 3px; font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
    .typeahead-item { display: block; padding: 8px 14px; text-decoration: none; color: var(--text-1); font-size: 13px; transition: background .1s; }
    .typeahead-item:hover { background: var(--surface2); }
    .typeahead-sub { font-size: 11px; color: var(--text-2); margin-top: 1px; }

    /* ── Mobile nav ──────────────────────────────────────────────────────── */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-1); font-size: 22px; line-height: 1; flex-shrink: 0; }
    .mobile-nav {
      display: none; position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
      background: var(--nav); z-index: 49; padding: 16px 20px;
      border-top: 1px solid var(--border); flex-direction: column; gap: 4px;
      overflow-y: auto;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { color: var(--text-2); text-decoration: none; padding: 13px 16px; border-radius: var(--r-sm); font-size: 15px; font-weight: 500; transition: color .15s, background .15s; }
    .mobile-nav a:hover, .mobile-nav a.active { color: white; background: rgba(99,102,241,.2); }

    /* ── Dropdown select-all controls ────────────────────────────────────── */
    .dropdown-actions { display: flex; gap: 6px; padding: 6px 10px 4px; border-bottom: 1px solid var(--border); }
    .dropdown-action-btn { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--text-2); cursor: pointer; font-family: inherit; transition: border-color .1s, color .1s; }
    .dropdown-action-btn:hover { border-color: var(--border2); color: var(--text-1); }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .nav { display: none; }
      .hamburger { display: block; }
      .topbar { padding: 0 16px; gap: 10px; }
      .topbar-right { gap: 8px; }
      .content { padding: 20px 16px 40px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .filter-bar { gap: 6px; }
      .page-header { flex-direction: column; gap: 8px; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stat-num { font-size: 28px; }
    }

    /* ── Misc ────────────────────────────────────────────────────────────── */
    .empty { text-align: center; padding: 52px; color: var(--text-2); font-size: 13px; }

    /* ── Scrollbars ──────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="{% url 'dashboard' %}" class="topbar-brand">
      <div class="topbar-icon">PE</div>
      <span class="topbar-title">PE Tracker</span>
    </a>
    <div class="nav">
      <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="{% url 'people' %}"    class="{% if request.resolver_match.url_name == 'people' %}active{% endif %}">People</a>
      <a href="{% url 'firms' %}"     class="{% if request.resolver_match.url_name == 'firms' or request.resolver_match.url_name == 'firm_detail' %}active{% endif %}">Firms</a>
      <a href="{% url 'signals' %}"   class="{% if request.resolver_match.url_name == 'signals' %}active{% endif %}">Signals</a>
    </div>
    <div class="typeahead-wrap">
      <form action="{% url 'search' %}" method="get" style="display:flex;align-items:center">
        <input type="text" name="q" id="topbar-search" value="{{ request.GET.q }}" placeholder="⌕  Search firms, people…"
               autocomplete="off"
               style="width:220px;border-radius:20px;font-size:12px;height:32px;padding:0 14px;min-width:0">
      </form>
      <div class="typeahead-panel" id="typeahead-panel"></div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar">{{ request.user.username|slice:":2" }}</div>
        <span>{{ request.user.username }}</span>
      </div>
      <div class="topbar-divider"></div>
      <a href="{% url 'logout' %}">Log out</a>
    </div>
    <button class="hamburger" id="hamburger-btn" aria-label="Menu">☰</button>
  </div>

  <nav class="mobile-nav" id="mobile-nav">
    <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="{% url 'people' %}"    class="{% if request.resolver_match.url_name == 'people' %}active{% endif %}">People</a>
    <a href="{% url 'firms' %}"     class="{% if request.resolver_match.url_name == 'firms' or request.resolver_match.url_name == 'firm_detail' %}active{% endif %}">Firms</a>
    <a href="{% url 'signals' %}"   class="{% if request.resolver_match.url_name == 'signals' %}active{% endif %}">Signals</a>
  </nav>
  <div class="content">
    {% block content %}{% endblock %}
  </div>

<script>
// Mobile nav toggle
document.getElementById('hamburger-btn').addEventListener('click', function() {
  document.getElementById('mobile-nav').classList.toggle('open');
});
document.getElementById('mobile-nav').querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => document.getElementById('mobile-nav').classList.remove('open'));
});

// Typeahead search
(function() {
  const input  = document.getElementById('topbar-search');
  const panel  = document.getElementById('typeahead-panel');
  if (!input || !panel) return;
  let timer;
  input.addEventListener('input', function() {
    clearTimeout(timer);
    const q = this.value.trim();
    if (q.length < 2) { panel.classList.remove('open'); panel.innerHTML = ''; return; }
    timer = setTimeout(function() {
      fetch('/api/search/?q=' + encodeURIComponent(q))
        .then(r => r.json())
        .then(function(data) {
          panel.innerHTML = '';
          if (!data.firms.length && !data.people.length) { panel.classList.remove('open'); return; }
          if (data.firms.length) {
            const sec = document.createElement('div');
            sec.className = 'typeahead-section';
            sec.textContent = 'Firms';
            panel.appendChild(sec);
            data.firms.forEach(function(f) {
              const a = document.createElement('a');
              a.className = 'typeahead-item';
              a.href = '/firms/' + f.id + '/';
              a.textContent = f.name;
              panel.appendChild(a);
            });
          }
          if (data.people.length) {
            const sec = document.createElement('div');
            sec.className = 'typeahead-section';
            sec.textContent = 'People';
            panel.appendChild(sec);
            data.people.forEach(function(p) {
              const a = document.createElement('a');
              a.className = 'typeahead-item';
              a.href = '/people/?q=' + encodeURIComponent(p.name);
              a.innerHTML = p.name + '<div class="typeahead-sub">' + p.firm + (p.title ? ' · ' + p.title : '') + '</div>';
              panel.appendChild(a);
            });
          }
          panel.classList.add('open');
        });
    }, 250);
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { panel.classList.remove('open'); this.blur(); }
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.typeahead-wrap')) panel.classList.remove('open');
  });
})();
</script>
</body>
</html>
