<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PE Tracker — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: white; border-radius: 12px; border: 1px solid #e8e8e8; padding: 36px 40px; width: 100%; max-width: 360px; }
    h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
    input { width: 100%; border: 1px solid #ddd; border-radius: 7px; padding: 9px 12px; font-size: 14px; outline: none; margin-bottom: 16px; }
    input:focus { border-color: #1a1a2e; }
    button { width: 100%; background: #1a1a2e; color: white; border: none; border-radius: 7px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    button:hover { background: #2d2d4e; }
    .error { background: #fcebeb; color: #a32d2d; border-radius: 7px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>PE Tracker</h1>
    <p class="subtitle">Sign in to access your dashboard</p>
    {% if form.errors %}
      <div class="error">Incorrect username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label>Username</label>
      <input type="text" name="username" autofocus>
      <label>Password</label>
      <input type="password" name="password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
