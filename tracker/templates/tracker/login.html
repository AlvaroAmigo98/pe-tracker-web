<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PE Tracker — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #F1F5F9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .login-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: white; letter-spacing: -0.5px;
    }
    .login-brand-name { font-size: 18px; font-weight: 700; color: #0F172A; letter-spacing: -0.3px; }
    .login-card {
      background: white;
      border-radius: 12px;
      border: 1px solid #E2E8F0;
      box-shadow: 0 4px 12px rgba(15,23,42,.08), 0 2px 4px rgba(15,23,42,.04);
      padding: 36px 36px 32px;
    }
    h1 { font-size: 18px; font-weight: 700; color: #0F172A; margin-bottom: 4px; letter-spacing: -0.3px; }
    .subtitle { font-size: 13px; color: #64748B; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; letter-spacing: 0.01em; }
    input {
      width: 100%;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
      color: #0F172A;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }
    button {
      width: 100%;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s;
      letter-spacing: 0.01em;
    }
    button:hover { background: #4338CA; }
    .error {
      background: #FEF2F2;
      color: #7F1D1D;
      border: 1px solid #FECACA;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: #94A3B8; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-icon">PE</div>
      <span class="login-brand-name">PE Tracker</span>
    </div>
    <div class="login-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to access your dashboard</p>
      {% if form.errors %}
        <div class="error">Incorrect username or password. Please try again.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password">
        <button type="submit">Sign in →</button>
      </form>
    </div>
    <div class="login-footer">PE firm intelligence platform</div>
  </div>
</body>
</html>
